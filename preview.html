<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  padding: 0;
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.card {
  background: white;
  border-radius: 20px;
  padding: 60px 80px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  text-align: center;
  max-width: 900px;
}
.logo {
  font-size: 64px;
  margin-bottom: 20px;
}
.title {
  font-size: 56px;
  font-weight: 700;
  color: #2c3e50;
  margin-bottom: 20px;
}
.subtitle {
  font-size: 28px;
  color: #7f8c8d;
  margin-bottom: 40px;
}
.stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 30px;
}
.stat-item {
  text-align: center;
}
.stat-num {
  font-size: 48px;
  font-weight: 700;
  color: #3498db;
}
.stat-label {
  font-size: 18px;
  color: #95a5a6;
  margin-top: 8px;
}
.tags {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 30px;
  flex-wrap: wrap;
}
.tag {
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 18px;
  font-weight: 500;
}
.tag-amazon { background: #ff9800; color: white; }
.tag-other { background: #607d8b; color: white; }
.tag-jingpin { background: #e74c3c; color: white; }
.tag-jingpu { background: #9b59b6; color: white; }
.tag-puhuo { background: #3498db; color: white; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🤖</div>
  <div class="title">RPA 应用场景库</div>
  <div class="subtitle">跨境电商自动化场景一站式查询平台</div>
  <div class="stats">
    <div class="stat-item">
      <div class="stat-num">307</div>
      <div class="stat-label">场景总数</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">8+</div>
      <div class="stat-label">电商平台</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">3</div>
      <div class="stat-label">运营模式</div>
    </div>
  </div>
  <div class="tags">
    <span class="tag tag-amazon">亚马逊</span>
    <span class="tag tag-other">其他平台</span>
    <span class="tag tag-jingpin">精品</span>
    <span class="tag tag-jingpu">精铺</span>
    <span class="tag tag-puhuo">铺货</span>
  </div>
</div>
</body>
</html>
