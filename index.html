var allData = DATA.data;
var filteredData = allData.slice();
var currentCategory = '全部';
var currentMode = '全部';
var currentPage = 1;
var pageSize = 20;

function init(){renderCategories();renderModes();renderTable()}

function renderCategories(){
  var container = document.getElementById('categoryList');
  var html = '<div class="category-item active" onclick="selectCategory(\'全部\',this)"><span>全部</span><span class="category-count">'+allData.length+'</span></div>';
  var counts = DATA.counts;
  for(var i=0;i<DATA.categories.length;i++){
    var cat = DATA.categories[i];
    var cnt = counts[cat]||0;
    if(cnt>0) html += '<div class="category-item" onclick="selectCategory(\''+cat+'\',this)"><span>'+cat+'</span><span class="category-count">'+cnt+'</span></div>';
  }
  container.innerHTML = html;
}

function renderModes(){
  var container = document.getElementById('modeList');
  var html = '<div class="category-item active" onclick="selectMode(\'全部\',this)"><span>全部</span><span class="category-count">'+allData.length+'</span></div>';
  var counts = DATA.modeCounts;
  var modes = ['精品','精铺','铺货','通用'];
  for(var i=0;i<modes.length;i++){
    var m = modes[i];
    var cnt = counts[m]||0;
    if(cnt>0) html += '<div class="category-item" onclick="selectMode(\''+m+'\',this)"><span>'+m+'</span><span class="category-count">'+cnt+'</span></div>';
  }
  container.innerHTML = html;
}

function selectCategory(cat,el){
  currentCategory = cat;
  currentPage = 1;
  var items = document.querySelectorAll('#categoryList .category-item');
  for(var i=0;i<items.length;i++) items[i].classList.remove('active');
  el.classList.add('active');
  filterData();
}

function selectMode(mode,el){
  currentMode = mode;
  currentPage = 1;
  var items = document.querySelectorAll('#modeList .category-item');
  for(var i=0;i<items.length;i++) items[i].classList.remove('active');
  el.classList.add('active');
  filterData();
}

document.getElementById('searchInput').addEventListener('input',function(e){currentPage=1;filterData()});

function filterData(){
  var term = document.getElementById('searchInput').value.toLowerCase();
  filteredData = [];
  for(var i=0;i<allData.length;i++){
    var item = allData[i];
    var matchCat = currentCategory==='全部' || item['板块']===currentCategory;
    var matchMode = currentMode==='全部' || item['适配模式']===currentMode;
    var matchSearch = !term || (item['应用名称']||'').toLowerCase().indexOf(term)>=0 || (item['简介']||'').toLowerCase().indexOf(term)>=0;
    if(matchCat && matchMode && matchSearch) filteredData.push(item);
  }
  renderTable();
}

function renderTable(){
  var tbody = document.getElementById('tableBody');
  var start = (currentPage-1)*pageSize;
  var pageData = filteredData.slice(start, start+pageSize);
  var html = '';
  if(pageData.length===0) html = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#999">暂无数据</td></tr>';
  else{
    for(var i=0;i<pageData.length;i++){
      var item = pageData[i];
      var idx = start + i;
      html += '<tr onclick="showDetail('+idx+')">';
      html += '<td><span class="category-tag '+getCatClass(item['板块'])+'">'+item['板块']+'</span></td>';
      html += '<td><span class="mode-tag '+getModeClass(item['适配模式'])+'">'+item['适配模式']+'</span></td>';
      html += '<td><div class="app-name">'+esc(item['应用名称']||'')+'</div></td>';
      html += '<td><div class="intro-text">'+esc(item['简介']||'')+'</div></td>';
      html += '<td><div class="steps-text">'+esc(item['RPA流程']||'')+'</div></td>';
      html += '</tr>';
    }
  }
  tbody.innerHTML = html;
  document.getElementById('stats').textContent = '共 '+filteredData.length+' 条';
  renderPagination();
}

function renderPagination(){
  var totalPages = Math.ceil(filteredData.length/pageSize);
  var container = document.getElementById('pagination');
  if(totalPages<=1){container.innerHTML='';return}
  var html = '<button class="page-btn" onclick="goToPage(1)"'+(currentPage===1?' disabled':'')+'>首页</button>';
  html += '<button class="page-btn" onclick="goToPage('+(currentPage-1)+')"'+(currentPage===1?' disabled':'')+'>上页</button>';
  var maxBtn=5, startPage=Math.max(1,currentPage-2), endPage=Math.min(totalPages,startPage+maxBtn-1);
  if(endPage-startPage<maxBtn-1) startPage=Math.max(1,endPage-maxBtn+1);
  for(var i=startPage;i<=endPage;i++) html += '<button class="page-btn'+(i===currentPage?' active':'')+'" onclick="goToPage('+i+')">'+i+'</button>';
  html += '<button class="page-btn" onclick="goToPage('+(currentPage+1)+')"'+(currentPage===totalPages?' disabled':'')+'>下页</button>';
  html += '<button class="page-btn" onclick="goToPage('+totalPages+')"'+(currentPage===totalPages?' disabled':'')+'>末页</button>';
  container.innerHTML = html;
}

function goToPage(p){currentPage=p;renderTable();document.querySelector('.table-container').scrollTop=0}

function showDetail(idx){
  var item = filteredData[idx];
  document.getElementById('modalTitle').textContent = item['应用名称']||'未命名';
  document.getElementById('modalTags').innerHTML = '<span class="category-tag '+getCatClass(item['板块'])+'">'+item['板块']+'</span> <span class="mode-tag '+getModeClass(item['适配模式'])+'">'+item['适配模式']+'</span>';
  document.getElementById('modalBody').innerHTML = '<div class="modal-section"><h3>简介</h3><p>'+(item['简介']||'暂无')+'</p></div><div class="modal-section"><h3>RPA流程</h3><p>'+(item['RPA流程']||'暂无')+'</p></div>';
  document.getElementById('detailModal').classList.add('show');
}

function closeModal(){document.getElementById('detailModal').classList.remove('show')}
document.getElementById('detailModal').addEventListener('click',function(e){if(e.target===this)closeModal()});

function exportCSV(){
  var headers = ['板块','适配模式','应用名称','简介','RPA流程'];
  var csv = '\uFEFF'+headers.join(',')+'\n';
  for(var i=0;i<filteredData.length;i++){
    var item = filteredData[i];
    var row = [];
    for(var j=0;j<headers.length;j++) row.push('"'+(item[headers[j]]||'').replace(/"/g,'""').replace(/\n/g,' ')+'"');
    csv += row.join(',')+'\n';
  }
  var blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'RPA应用场景_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function getCatClass(cat){return cat==='亚马逊'?'tag-amazon':'tag-other'}
function getModeClass(mode){
  var m={'精品':'mode-jingpin','精铺':'mode-jingpu','铺货':'mode-puhuo','通用':'mode-tongyong'};
  return m[mode]||'mode-tongyong';
}

init();
</script>
